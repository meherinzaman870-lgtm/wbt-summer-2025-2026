<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
</head>
<body>

    <form action="#" method="POST">
        <fieldset>
            <legend>Contact Me</legend>

            <table style="border-collapse: collapse; border: 0;">
                
                <tr>
                    <td><label for="first-name">First Name:</label></td>
                    <td><input type="text" id="first-name" name="firstName" required></td>
                </tr>

                <tr>
                    <td><label for="last-name">Last Name:</label></td>
                    <td><input type="text" id="last-name" name="lastName" required></td>
                </tr>

                <tr>
                    <td><label>Gender:</label></td>
                    <td>
                        <input type="radio" name="gender" value="male" id="male"> <label for="male">Male</label>
                        <input type="radio" name="gender" value="female" id="female"> <label for="female">Female</label>
                    </td>
                </tr>

                <tr>
                    <td><label>Services:</label></td>
                    <td>
                        <input type="checkbox" name="services" value="webdevelopment" id="service-web"> 
                        <label for="service-web">Web Development</label>
                        
                        <input type="checkbox" name="services" value="ai/ml" id="service-ai"> 
                        <label for="service-ai">AI/ML</label>
                        
                        <input type="checkbox" name="services" value="backend" id="service-backend"> 
                        <label for="service-backend">Backend</label>
                    </td>
                </tr>

                <tr>
                    <td><label for="reason">Reason Of Contact:</label></td>
                    <td>
                        <select id="reason" name="reason">
                            <option value="job">Job</option>
                            <option value="projects">Projects</option>
                            <option value="thesis">Thesis</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><label for="book-slot">Book Slot (Date):</label></td>
                    <td><input type="date" id="book-slot" name="bookSlot"></td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="Register">
                        <input type="reset" value="Reset">
                    </td>
                </tr>

            </table>
        </fieldset>
    </form>

</body>
</html>
