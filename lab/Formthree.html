<!DOCTYPE html>
<html>
<head>
    <title>website</title>
</head>
<body>

    <div class="form-card">
        <div class="form-header">
            <h1>Create your account</h1>
            <span>Join us in a couple of steps.</span>
        </div>

        <form class="form-body">
            <div class="input-group">
                <label>Full name</label>
                <input type="text" placeholder="Jane Doe">
            </div>

            <div class="input-group">
                <label>Age</label>
                <input type="number" placeholder="28">
            </div>

            <div class="input-group">
                <label>Date of birth</label>
                <input type="text" placeholder="25/06/2026">
            </div>

            <div class="input-group">
                <label>Email address</label>
                <input type="email" placeholder="jane@company.com">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="........">
            </div>

            <div class="input-group">
                <label>Preferred contact</label>
                <div class="radio-group-container">

                    <label class="radio-label">
                        <input type="radio" name="contact_method" value="email">
                        <span class="custom-radio"></span>Email
                    </label>

                    <label class="radio-label">
                        <input type="radio" name="contact_method" value="phone">
                        <span class="custom-radio"></span>Phone
                    </label>

                    <label class="radio-label">
                        <input type="radio" name="contact_method" value="sms">
                        <span class="custom-radio"></span>SMS
                    </label>

                </div>
            </div>

            <div class="input-group">
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>
        </form>
</body>
</html>
