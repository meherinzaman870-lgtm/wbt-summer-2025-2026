<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Information</title>
</head>
<body>

    <form action="#" method="POST">
            <legend style="color: red;">Donor Information</legend>

            <table style="border-collapse: collapse; border: 0;">
                
                <tr>
                    <td><label for="first-name">First Name*</label></td>
                    <td><input type="text" id="first-name" name="firstName" required></td>
                </tr>

                <tr>
                    <td><label for="last-name">Last Name*</label></td>
                    <td><input type="text" id="last-name" name="lastName" required></td>
                </tr>

                <tr>
                    <td><label for="company">Company</label></td>
                    <td><input type="text" id="company" name="company" required></td>
                </tr>

                <tr>
                    <td><label for="address-1">Address 1*</label></td>
                    <td><input type="text" id="address-1" name="address-1" required></td>
                </tr>

                <tr>
                    <td><label for="address-2">Address 2</label></td>
                    <td><input type="text" id="address-2" name="address-2" required></td>
                </tr>

                <tr>
                    <td><label for="city">City*</label></td>
                    <td><input type="text" id="city" name="city" required></td>
                </tr>

                <tr>
                    <td><label for="state">State*</label></td>
                    <td>
                        <select id="state" name="state">
                            <option value="a">A</option>
                            <option value="b">B</option>
                            <option value="c">C</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><label for="zip-code">Zip Code*</label>
                    <td><input type="text" id="zip-code" pattern="^[A-Za-z0-9]+$" required></td>
                </tr>

                <tr>
                    <td><label for="country">Country*</label></td>
                    <td>
                        <select id="country" name="country">
                            <option value="america">America</option>
                            <option value="bangladesh">Bangladesh</option>
                            <option value="china">China</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><label for="phone">Phone</label></td>
                    <td><input type="tel" id="phone" name="phone" required></td>
                </tr>

                <tr>
                    <td><label for="fax">Fax</label></td>
                    <td><input type="tel" id="fax" name="fax" required></td>
                </tr>

                <tr>
                    <td><label for="email">Email*</label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>

                <tr>
                    <td><label>Donation Amount*</label></td>            
                    <td>
                        <input type="radio" name="donation-amount" value="none" id="none"> <label for="none">None</label>
                        <input type="radio" name="donation-amount" value="$50" id="$50"> <label for="$50">$50</label>
                        <input type="radio" name="donation-amount" value="$75" id="$75"> <label for="$75">$50</label>
                        <input type="radio" name="donation-amount" value="$100" id="$100"> <label for="$100">$1000</label>
                        <input type="radio" name="donation-amount" value="$250" id="$250"> <label for="$250">$250</label>
                        <input type="radio" name="donation-amount" value="$others" id="$others"> <label for="$others">$Others</label>

                    </td>
                </tr>

                <tr>
                <td>
                    <label>(check a button or type in your amount)</label></tr>
                </tr>


                <tr>
                    <td></td>
                    <td>Other Amount $ <input type="tel"></td>
                </tr>
                
                 <tr>
                    <td><label>Recurring Donation</label></td>
                    <td>
                        <input type="checkbox" >I am interested in giving on a regular basis 
                        
                    </td>
                </tr>

                <tr>
                    <td>(Check if yes)</td>
                    
                </tr>

                <tr>
                    <td></td>
                    <td>Monthly Credit Card $<input type="text"> For <input type="text"> Months</td>
                </tr>

    </table>
    </form>

</body>
</html>
